<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CustomDialogs Builder</title>
  <meta name="description" content="Build CustomDialogs dialog files visually and download the ready-to-use .yml." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#128172;</text></svg>" />
  <link rel="stylesheet" href="vendor/drawflow.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand__mark" aria-hidden="true">&#9632;</span>
      <div class="brand__text">
        <span class="brand__name">CustomDialogs <b>Builder</b></span>
        <span class="brand__sub">Design a dialog, download the <code>.yml</code>, drop it in <code>dialogs/</code>.</span>
      </div>
    </div>
    <div class="topbar__actions">
      <button id="btn-example" class="btn btn--ghost" type="button">Load example</button>
      <button id="btn-reset" class="btn btn--ghost" type="button">New</button>
      <button id="btn-copy" class="btn btn--ghost" type="button">Copy YAML</button>
      <button id="btn-download" class="btn btn--ghost" type="button">Download .yml</button>
      <button id="btn-save" class="btn btn--save" type="button" hidden>Save to folder</button>
    </div>
  </header>

  <!-- ================= FULL-PAGE NODE STAGE ================= -->
  <main class="stage" aria-label="Node editor">
    <div id="drawflow"></div>

    <!-- Floating toolbar -->
    <div class="canvas-toolbar float">
      <div class="canvas-toolbar__group">
        <button id="add-step" class="btn btn--small" type="button" title="Add a conversation step">+ Step</button>
        <button id="add-button" class="btn btn--small" type="button" title="Add a button">+ Button</button>
        <button id="add-input" class="btn btn--small" type="button" title="Add a form input">+ Input</button>
        <button id="btn-layout" class="btn btn--small btn--ghost" type="button" title="Re-arrange nodes">Auto-layout</button>
      </div>
      <div class="canvas-toolbar__group">
        <button id="zoom-out" class="icon-btn" type="button" title="Zoom out">&#8722;</button>
        <button id="zoom-reset" class="icon-btn" type="button" title="Reset zoom">&#9633;</button>
        <button id="zoom-in" class="icon-btn" type="button" title="Zoom in">&#43;</button>
      </div>
    </div>

    <!-- Floating explorer (left) -->
    <aside class="panel panel--left" id="panel-explorer" aria-label="Dialogs">
      <div class="panel__head">
        <h2 class="panel__title">Dialogs</h2>
        <div class="panel__head-actions">
          <button id="ex-refresh" class="icon-btn" type="button" title="Rescan folder" hidden>&#8635;</button>
          <button class="icon-btn panel__toggle" data-panel="panel-explorer" type="button" title="Collapse">&#10094;</button>
        </div>
      </div>
      <div class="panel__body">
        <button id="ex-open" class="btn btn--small btn--block" type="button">Open dialogs folder&hellip;</button>
        <div id="ex-folder" class="explorer__folder" hidden></div>
        <div id="ex-tree" class="tree" role="tree"></div>
        <p id="ex-hint" class="explorer__hint"></p>
      </div>
    </aside>

    <!-- Floating preview + YAML (right) -->
    <aside class="panel panel--right" id="panel-preview" aria-label="Preview">
      <div class="panel__head">
        <h2 class="panel__title">Preview</h2>
        <button class="icon-btn panel__toggle" data-panel="panel-preview" type="button" title="Collapse">&#10095;</button>
      </div>
      <div class="panel__body">
        <div class="mc-screen" id="mc-preview"></div>
        <div class="yaml">
          <div class="yaml__head">
            <span class="yaml__label" id="yaml-filename">dialog.yml</span>
            <span class="yaml__path" id="yaml-path"></span>
          </div>
          <pre id="yaml-out" class="yaml__code"></pre>
        </div>
      </div>
    </aside>

    <!-- Re-open tabs for collapsed panels -->
    <button class="panel-reopen panel-reopen--left" id="reopen-explorer" data-panel="panel-explorer" type="button" hidden>Dialogs</button>
    <button class="panel-reopen panel-reopen--right" id="reopen-preview" data-panel="panel-preview" type="button" hidden>Preview</button>
  </main>

  <div id="toast" class="toast" hidden></div>

  <script src="vendor/drawflow.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
